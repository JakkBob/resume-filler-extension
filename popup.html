<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历表单填充助手</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 -->
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="#0078d4" stroke-width="2"/>
          <path d="M7 8h10M7 12h10M7 16h6" stroke="#0078d4" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="title">简历表单填充助手</h1>
    </header>

    <!-- 模式切换 -->
    <section class="mode-section">
      <h2 class="section-title">填充模式</h2>
      <div class="mode-options">
        <label class="mode-option">
          <input type="checkbox" id="autoFillMode" checked>
          <span class="checkbox-custom"></span>
          <span class="mode-label">自动填充模式</span>
        </label>
        <label class="mode-option">
          <input type="checkbox" id="manualFillMode" checked>
          <span class="checkbox-custom"></span>
          <span class="mode-label">手动提示模式</span>
        </label>
      </div>
    </section>

    <!-- 操作按钮 -->
    <section class="action-section">
      <button id="autoFillBtn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M13 3v2h5.586l-6.293 6.293 1.414 1.414L20 6.414V12h2V3h-9zM4 21h17v-2H4V4H2v17a2 2 0 002 2z" fill="currentColor"/>
        </svg>
        一键自动填充
      </button>
      <button id="openConfigBtn" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        配置管理
      </button>
    </section>

    <!-- 统计信息 -->
    <section class="stats-section">
      <div class="stat-item">
        <span class="stat-value" id="totalItems">0</span>
        <span class="stat-label">配置项</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="lastFill">-</span>
        <span class="stat-label">上次填充</span>
      </div>
    </section>

    <!-- 状态提示 -->
    <div id="statusToast" class="toast hidden">
      <span class="toast-message"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
